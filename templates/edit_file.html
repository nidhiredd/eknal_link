<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit File</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-6 text-white">

<div class="max-w-md w-full p-6 bg-gray-800 rounded-2xl shadow-lg">
  <h2 class="text-2xl font-bold mb-4 text-cyan-400">Edit File</h2>
  <form method="POST" class="flex flex-col gap-4">
    <input type="text" name="title" value="{{ file.title }}" placeholder="File Title" class="w-full p-2 rounded bg-gray-700 text-white" required>
    <button type="submit" class="bg-cyan-500 hover:bg-cyan-600 py-2 rounded font-semibold transition">Update File</button>
  </form>
  <a href="{{ url_for('dashboard') }}" class="text-cyan-400 mt-4 inline-block">Back to Dashboard</a>
</div>

</body>
</html>
