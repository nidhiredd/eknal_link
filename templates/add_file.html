<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Add File</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-8">

<div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg space-y-6">

    <!-- Header -->
    <h2 class="text-2xl font-bold text-gray-700 text-center">Upload New File</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="space-y-2">
                {% for category, message in messages %}
                    <div class="px-4 py-2 rounded-lg text-sm {% if category=='success' %}bg-green-100 text-green-800{% elif category=='danger' %}bg-red-100 text-red-800{% elif category=='info' %}bg-blue-100 text-blue-800{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <!-- Form -->
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        <div>
            <label for="title" class="block mb-1 font-medium text-gray-600">Title</label>
            <input type="text" name="title" id="title" placeholder="Enter title"
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-400 focus:outline-none" required>
        </div>
        <div>
            <label for="file" class="block mb-1 font-medium text-gray-600">Choose File</label>
            <input type="file" name="file" id="file"
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-indigo-400 focus:outline-none" required>
        </div>
        <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-md font-semibold transition">
            Upload
        </button>
    </form>

    <!-- Back Link -->
    <p class="text-center text-gray-600">
        <a href="{{ url_for('dashboard') }}" class="text-indigo-500 hover:underline font-medium">Back to Dashboard</a>
    </p>

</div>

</body>
</html>
