<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Eknal Technologies</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-indigo-50 via-white to-indigo-100 min-h-screen flex flex-col items-center py-6">

<!-- Header -->
<div class="text-center mb-8 px-4">
  <h1 class="text-3xl sm:text-4xl font-bold text-indigo-600 mb-2">
    Eknal Technologies
  </h1>
  <p class="text-gray-600 text-sm sm:text-base">
    Admin Dashboard
  </p>
</div>

<!-- Flash Messages -->

<!-- CONTENT -->
<div class="w-full max-w-md flex flex-col space-y-4 px-4">

<!-- LINKS -->
{% for link in links %}
<div class="flex justify-between items-center bg-white shadow-md p-4 rounded-xl">

  <span class="font-semibold text-indigo-700">{{ link.title }}</span>

  <div class="flex gap-2">
    <a href="{{ link.url }}" target="_blank"
       class="bg-blue-500 text-white px-3 py-1 rounded text-sm">
      Open
    </a>

    <a href="{{ url_for('edit_link', id=link.id) }}"
       class="bg-yellow-400 text-white px-3 py-1 rounded text-sm">
      Edit
    </a>

    <form action="{{ url_for('delete_link', id=link.id) }}" method="post">
      <button class="bg-red-500 text-white px-3 py-1 rounded text-sm"
              onclick="return confirm('Delete this link?')">
        Delete
      </button>
    </form>
  </div>

</div>
{% endfor %}

<!-- FILES -->
{% for file in files %}
<div class="flex justify-between items-center bg-white shadow-md p-4 rounded-xl">

  <span class="font-semibold text-blue-700">{{ file.title }}</span>

  <div class="flex gap-2">

    <a href="{{ url_for('download', id=file.id) }}"
       class="bg-blue-500 text-white px-3 py-1 rounded text-sm">
      Download
    </a>

    <form action="{{ url_for('delete_file', id=file.id) }}" method="post">
      <button class="bg-red-500 text-white px-3 py-1 rounded text-sm"
              onclick="return confirm('Delete this file?')">
        Delete
      </button>
    </form>

  </div>

</div>
{% endfor %}

</div>

<!-- ACTION BUTTONS -->
<div class="mt-8 flex flex-col sm:flex-row gap-3 w-full max-w-md px-4">

  <a href="{{ url_for('add_link') }}"
     class="flex-1 bg-indigo-500 text-white py-3 rounded-xl text-center font-semibold">
    Add Link
  </a>

  <a href="{{ url_for('add_file') }}"
     class="flex-1 bg-purple-500 text-white py-3 rounded-xl text-center font-semibold">
    Add File
  </a>

  <a href="{{ url_for('admin_logout') }}"
     class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-xl text-center font-semibold">
    Logout
  </a>

</div>

</body>
</html>
