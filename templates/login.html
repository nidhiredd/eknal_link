<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-xl p-8 max-w-md w-full">
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">Login</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="space-y-2 mb-4">
                {% for category, message in messages %}
                    <div class="px-4 py-2 rounded-lg text-sm {% if category=='success' %}bg-green-100 text-green-800{% elif category=='danger' %}bg-red-100 text-red-800{% elif category=='info' %}bg-blue-100 text-blue-800{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-5">
        <input type="text" name="username" placeholder="Username" required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        <input type="password" name="password" placeholder="Password" required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"/>
        <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition">Login</button>
    </form>

    <p class="text-center text-gray-600 mt-4 text-sm">
        Don't have an account? <a href="{{ url_for('register') }}" class="text-blue-500 hover:text-blue-600 font-medium">Register here</a>
    </p>
</div>

</body>
</html>
